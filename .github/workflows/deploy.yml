name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- Build step goes here when React/Vite is added ---
      # - uses: actions/setup-node@v4
      #   with:
      #     node-version: '20'
      #     cache: 'npm'
      # - run: npm ci
      # - run: npm run build

      - name: Assemble output
        run: |
          mkdir -p ./output
          cp index.html ./output/
          cp style.css ./output/
          cp -r assets/ ./output/assets/
          # When adding a build step, replace above with: cp -r dist/. ./output/

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./output
          force_orphan: true
          cname: charon.cx
