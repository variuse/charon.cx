<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charon.cx | Frederik</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #e5e5e5;
            --accent-color: #3b82f6; 
            --gold-color: #ffd700;
            --code-color: #64ffda; 
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 50%, #111 0%, #050505 70%);
            color: var(--text-color);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
            position: relative;
        }

        .container {
            max-width: 580px;
            position: relative;
            z-index: 10;
        }

        /* --- 1. The River Styx Fog Animation --- */
        .fog-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30vh;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }

        .fog-layer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 200%;
            height: 100%;
            background: linear-gradient(to top, rgba(20,20,20,0.8) 0%, transparent 100%);
            opacity: 0.5;
            animation: drift 20s linear infinite;
            mask-image: linear-gradient(to right, transparent, black 50%, transparent);
        }

        .fog-layer:nth-child(2) {
            animation-duration: 35s;
            animation-direction: reverse;
            opacity: 0.3;
            bottom: -20px;
        }

        @keyframes drift {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* --- 2. The HUD Profile --- */
        .profile-container {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 2.5rem auto;
            border-radius: 50%;
            overflow: hidden;
            border: 1px solid #222;
            transition: border-color 0.3s ease;
            transform: translateZ(0); 
            background: #000;
        }

        .profile-pic {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%);
            transition: all 0.4s ease;
            transform: scale(1.05);
        }

        .hud-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(2px);
        }

        .hud-text {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--code-color);
            text-align: left;
            line-height: 1.8;
            letter-spacing: -0.5px;
        }

        .profile-container:hover {
            border-color: var(--code-color);
            box-shadow: 0 0 25px rgba(100, 255, 218, 0.1);
        }

        .profile-container:hover .profile-pic {
            transform: scale(1);
            filter: grayscale(100%) blur(3px);
        }

        .profile-container:hover .hud-overlay { opacity: 1; }

        /* --- 3. Typography --- */
        h1 {
            font-family: 'Inter', sans-serif;
            font-weight: 200;
            letter-spacing: 0.25em;
            text-transform: lowercase;
            margin-bottom: 2rem;
            font-size: 2rem;
            color: #fff;
            opacity: 0.85;
        }

        .tagline {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--dim-color);
            margin-bottom: 3.5rem;
            line-height: 1.8;
        }

        /* --- 4. The Ferryman Hook --- */
        .hook {
            font-size: 1.1rem;
            margin-bottom: 4.5rem;
            font-weight: 300;
            color: #ccc;
        }

        .smart-weight {
            display: inline-block;
            position: relative;
            cursor: help;
            color: var(--text-color);
            transition: all 0.3s ease;
            border-bottom: 1px solid var(--accent-color);
        }

        .smart-weight:hover {
            color: #fff;
            letter-spacing: 2px;
            border-bottom: 1px solid #fff;
        }

        /* --- 5. The Obol Button --- */
        .contact-btn {
            text-decoration: none;
            color: var(--bg-color);
            background-color: var(--text-color);
            padding: 14px 32px;
            border-radius: 1px;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.4s ease;
            position: relative;
            z-index: 20;
        }

        .contact-btn:hover {
            background-color: #fff;
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.3); 
            transform: translateY(-2px);
        }

        /* --- 6. Footer & Social --- */
        .footer {
            margin-top: 5rem;
            font-size: 0.65rem;
            color: #333;
            font-family: 'JetBrains Mono', monospace;
            /* Changed to Row for "Imprint Line" feel */
            display: flex;
            flex-direction: row; 
            justify-content: center;
            align-items: center;
            gap: 12px;
        }

        .separator {
            opacity: 0.2;
        }

        .social-link {
            display: flex;
            align-items: center;
            opacity: 0.5;
            transition: all 0.3s ease;
        }

        .social-link:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        .social-icon {
            width: 20px; /* Scaled down from 50px to fit line */
            height: 20px;
            object-fit: contain;
        }

        .anim { opacity: 0; transform: translateY(15px); animation: fadeUp 0.8s ease forwards; }
        .d-1 { animation-delay: 0.1s; }
        .d-2 { animation-delay: 0.2s; }
        .d-3 { animation-delay: 0.3s; }
        .d-4 { animation-delay: 0.4s; }

        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
        
        @media (max-width: 600px) {
            h1 { font-size: 1.5rem; letter-spacing: 0.15em; }
        }
    </style>
</head>
<body>

    <div class="fog-container">
        <div class="fog-layer"></div>
        <div class="fog-layer"></div>
    </div>

    <div class="container">
        
        <div class="profile-container anim d-1">
            <img src="result_146456.jpeg" alt="Frederik" class="profile-pic">
            <div class="hud-overlay">
                <div class="hud-text">
                    > LOC: BERLIN<br>
                    > BPM: 145<br>
                    > OBOL: PENDING
                </div>
            </div>
        </div>
        
        <h1 class="anim d-2">charon.cx</h1>
        
        <p class="tagline anim d-3">
            AI whisperer // calisthenics // techno // gaming <br>
            UI/UX development & other nerdy stuff...
        </p>

        <p class="hook anim d-4">
            Safe passage across the <span class="smart-weight">Uncanny Valley</span>.
            <br>
            <span style="color: #555; font-size: 0.8em; display: block; margin-top: 10px; font-weight: 300;">
                (Because unoptimized <span class="smart-weight">weights</span> will drag you under.)
            </span>
        </p>

        <a href="mailto:frederik@charon.cx" class="contact-btn anim d-4">
            Ping the Ferryman
        </a>

        <div class="footer anim d-4">
            <span>&copy; 2025 Charon.cx</span>
            <span class="separator">|</span>
            <a href="https://www.instagram.com/insta.linkin" target="_blank" class="social-link" aria-label="Instagram">
                <img src="insta.png" alt="Instagram" class="social-icon">
            </a>
        </div>
    </div>

</body>
</html>
